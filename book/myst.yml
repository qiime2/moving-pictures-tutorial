# See docs at: https://mystmd.org/guide/frontmatter
version: 1
project:
  id: moving-pictures-tutorial
  title: The Moving Pictures Tutorial
  # description:
  # keywords: []
  # uncommenting "authors" will put the author list on every page
  # authors: ["QIIME 2"]
  # github:
  references:
    rachis-glossary-target: https://news.rachis.org/en/latest/
    rachis-library-target: https://library.qiime2.org

  plugins:
    - type: executable
      path: q2doc-plug.py

  toc:
    - file: intro.md
